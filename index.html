<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Match - Max Revenue</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; position: fixed; touch-action: none; }
        body { background: #eceff1; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }
        
        /* 上部広告：100px固定 */
        #ad-top-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100px; 
            background: #eceff1; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }

        /* ゲームエリア */
        #game-outer { 
            position: absolute; top: 100px; bottom: 0; left: 0; right: 0; 
            background: #eceff1; overflow: hidden; z-index: 10;
        }
        #main-container { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px 0 30px 0; }
        
        #ui-layer { width: 100%; display: flex; justify-content: space-around; padding: 10px; z-index: 20; }
        .ui-box { padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 18px; color: #455a64; background: white; box-shadow: 0 3px #b0bec5; min-width: 120px; text-align: center; }

        /* 問題エリア */
        #question-area { text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; width: 100%; }
        #word-display { font-size: 64px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        #color-box { width: 120px; height: 120px; border-radius: 30px; border: 6px solid white; box-shadow: 0 6px 15px rgba(0,0,0,0.1); transition: 0.1s; }

        /* 操作ボタン */
        #choice-buttons { display: flex; gap: 40px; width: 100%; justify-content: center; padding-bottom: 20px; }
        .ans-btn { 
            width: 100px; height: 100px; border-radius: 50%; border: none; 
            font-size: 40px; font-weight: bold; color: white; cursor: pointer; 
            box-shadow: 0 6px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
            transition: transform 0.05s;
        }
        #btn-yes { background: #4caf50; } /* ◯ */
        #btn-no { background: #f44336; }  /* ✕ */
        .ans-btn:active { transform: translateY(5px); box-shadow: 0 2px rgba(0,0,0,0.2); }

        /* メニュー/リザルト画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; color: #455a64;
            padding: 10px;
        }

        /* リザルト用 300x250 広告枠 */
        #ad-middle-box {
            width: 300px; height: 250px; background: #f5f5f5; margin: 15px 0;
            display: none; justify-content: center; align-items: center; 
            border-radius: 12px; overflow: hidden; border: 1px solid #ddd;
        }

        /* 5秒全画面広告 */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 330px; background: #fff; position: relative; border-radius: 8px; }
        #close-ad-btn { position: absolute; top: -50px; right: 0px; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 2px solid #fff; cursor: pointer; }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .menu-btn { width: 260px; padding: 16px; font-size: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #455a64; color: white; box-shadow: 0 4px #263238; }
        #retry-btn:disabled { background: #999; box-shadow: none; opacity: 0.7; }
        .link-btn { background: #ec407a; color: white; box-shadow: 0 4px #ad1457; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top-container">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="main-container">
            <div id="ui-layer">
                <div id="score-display" class="ui-box">SCORE: 0</div>
                <div id="timer-display" class="ui-box">TIME: 3.0</div>
            </div>
            
            <div style="font-weight:bold; color:#78909c; font-size: 14px; letter-spacing: 1px;">「文字の意味」と「箱の色」は同じ？</div>

            <div id="question-area">
                <div id="word-display">...</div>
                <div id="color-box"></div>
            </div>

            <div id="choice-buttons">
                <button id="btn-no" class="ans-btn" onclick="check(false)">✕</button>
                <button id="btn-yes" class="ans-btn" onclick="check(true)">◯</button>
            </div>
        </div>

        <div id="menuScreen">
            <h2 id="result-msg" style="font-size: 32px; margin-bottom: 5px;">Color Match</h2>
            <p id="sub-msg" style="font-size: 14px; color: #78909c; margin-top: 0;">色の誘惑に打ち勝て！</p>
            
            <div id="ad-middle-box">
                <ins class="adsbygoogle"
                     style="display:inline-block;width:300px;height:250px"
                     data-ad-client="ca-pub-1299640300068792"
                     data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート ★</button>
                <a href="https://saaaachi.github.io/" class="menu-btn link-btn">他のゲーム</a>
            </div>
        </div>
    </div>

    <div id="inter-screen">
        <div class="inter-content">
            <div id="close-ad-btn" onclick="closeInterAd()">5</div>
            <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:8px; background: #fff;"></iframe>
        </div>
    </div>

    <script>
        let score = 0, gameActive = false, timeLeft = 3.0, timer, playCount = 0;
        const colorData = [
            { name: "あか", code: "#f44336" },
            { name: "あお", code: "#2196f3" },
            { name: "みどり", code: "#4caf50" },
            { name: "きいろ", code: "#fbc02d" },
            { name: "くろ", code: "#212121" },
            { name: "むらさき", code: "#9c27b0" }
        ];
        let isCorrectMatch = false;

        const menuScreen = document.getElementById("menuScreen"), adMid = document.getElementById("ad-middle-box"), resultMsg = document.getElementById("result-msg"), retryBtn = document.getElementById("retry-btn");

        function startNewGame() {
            menuScreen.style.display = "none"; adMid.style.display = "none";
            score = 0; gameActive = true;
            nextQuestion();
        }

        function nextQuestion() {
            if(!gameActive) return;
            // スコアが上がるほど制限時間が短くなる（最低0.6秒）
            timeLeft = Math.max(0.6, 3.0 - (score * 0.08));
            updateUI();

            const wordObj = colorData[Math.floor(Math.random() * colorData.length)];
            isCorrectMatch = Math.random() > 0.5;
            
            let colorObj;
            if(isCorrectMatch) { colorObj = wordObj; } 
            else {
                do { colorObj = colorData[Math.floor(Math.random() * colorData.length)]; } while(colorObj === wordObj);
            }

            const wordEl = document.getElementById("word-display");
            wordEl.innerText = wordObj.name;
            // 文字自体の色はランダム（さらに混乱を誘う）
            wordEl.style.color = colorData[Math.floor(Math.random() * colorData.length)].code;
            document.getElementById("color-box").style.backgroundColor = colorObj.code;

            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 0.1;
                updateUI();
                if(timeLeft <= 0) gameOver("時間切れ！⏳");
            }, 100);
        }

        function check(userAns) {
            if(!gameActive) return;
            if(userAns === isCorrectMatch) {
                score++;
                // 正解時に一瞬光らせる演出
                document.getElementById("color-box").style.transform = "scale(1.1)";
                setTimeout(() => { document.getElementById("color-box").style.transform = "scale(1.0)"; }, 50);
                nextQuestion();
            } else {
                gameOver("まちがい！😱");
            }
        }

        function updateUI() {
            document.getElementById("score-display").innerText = "SCORE: " + score;
            document.getElementById("timer-display").innerText = "TIME: " + Math.max(0, timeLeft).toFixed(1);
        }

        function gameOver(msg) {
            gameActive = false; playCount++;
            clearInterval(timer);
            
            retryBtn.innerText = "お待ちください..."; retryBtn.disabled = true;
            adMid.style.display = "flex";
            resultMsg.innerText = msg;
            document.getElementById("sub-msg").innerText = "最終スコア: " + score;
            menuScreen.style.display = "flex";

            setTimeout(() => { retryBtn.disabled = false; retryBtn.innerText = "もう一度遊ぶ"; }, 1500);

            // 【2-5-8 収益サイクル】
            if (playCount === 2 || (playCount >= 5 && (playCount - 2) % 3 === 0)) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timerVal = 5;
            closeBtn.innerText = timerVal; closeBtn.style.pointerEvents = "none"; closeBtn.style.background = "#555";
            const countdown = setInterval(() => {
                timerVal--;
                if (timerVal > 0) closeBtn.innerText = timerVal;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.background = "#ff4444";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
